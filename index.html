
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalOne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #60a5fa;
            --accent: #93c5fd;
            --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: #0f172a;
            overflow-x: hidden;
        }

        /* Pure Water Droplets (Visual Identity) */
        .water-droplet {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.9) 0%, rgba(59,130,246,0.1) 60%, rgba(37,99,235,0.02) 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -5px -5px 15px rgba(255,255,255,0.8), 
                        inset 5px 5px 15px rgba(0,0,0,0.01),
                        10px 20px 40px rgba(31, 38, 135, 0.03);
        }

        .droplet-huge {
            width: 600px;
            height: 650px;
            top: 15%;
            left: 50%;
            transform: translateX(-50%) rotate(5deg);
            filter: blur(40px);
            opacity: 0.02;
        }

        .droplet-main {
            width: 320px;
            height: 360px;
            bottom: -80px;
            right: -60px;
            filter: blur(8px);
            opacity: 0.1;
            transform: rotate(-25deg);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.04);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 12px rgba(31, 38, 135, 0.03);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        .animate-float {
            animation: float 10s ease-in-out infinite;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-content {
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "jspdf": "https://esm.sh/jspdf@^2.5.1"
  }
}
</script>
</head>
<body>
    <div class="water-droplet droplet-huge"></div>
    <div class="water-droplet droplet-main animate-float"></div>
    <div id="root"></div>
</body>
</html>
